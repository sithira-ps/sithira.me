name: Deploy Next.js to VPS

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and Push Docker Image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: sithiraps/sithira-me:latest
        cache-from: type=registry,ref=sithiraps/sithira-me:buildcache
        cache-to: type=registry,ref=sithiraps/sithira-me:buildcache,mode=max
    - name: Deploy on VPS via SSH
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        port: 22
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        script: |
          docker stop sithira-me || true
          docker rm sithira-me || true
          docker run -d --pull=always --restart=unless-stopped --name sithira-me \
            --network my-proxy-network \
            -p 4020:4020 \
            -e NODE_ENV=production \
            -e GA_ID=${{ secrets.GA_ID }} \
            -e AUTH_SECRET=${{ secrets.AUTH_SECRET }} \
            -e AUTH_GITHUB_ID=${{ secrets.AUTH_GITHUB_ID }} \
            -e AUTH_GITHUB_SECRET=${{ secrets.AUTH_GITHUB_SECRET }} \
            -e AUTH_URL=https://sithira.me \
            -e AUTH_TRUST_HOST=true \
            -e GITHUB_PAT=${{ secrets.GH_PAT }} \
            -e ALLOWED_GITHUB_USERNAME=sithira-ps \
            sithiraps/sithira-me:latest
